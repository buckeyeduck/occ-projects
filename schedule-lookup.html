<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohio Clean Cans - Schedule Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a2e7a;
  --blue: #0056DF;
  --blue-light: #1a6ef5;
  --blue-xlight: #e8f0fe;
  --red: #CC2222;
  --red-light: #fef2f2;
  --orange: #FF9D00;
  --orange-light: #fff7ed;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --gray: #6b7280;
  --lgray: #f3f4f6;
  --border: #e5e7eb;
  --white: #ffffff;
  --text: #111827;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: linear-gradient(135deg, #f0f2f7 0%, #e8ecf4 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Header */
.header {
  background: var(--navy);
  color: #fff;
  width: 100%;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.logo-hex {
  width: 40px; height: 40px;
  background: var(--blue);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.brand-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900; font-size: 18px; letter-spacing: 0.5px;
}
.brand-sub {
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
}

/* Main Card */
.card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  max-width: 520px;
  width: 95%;
  margin: 32px auto;
  overflow: hidden;
}
.card-header {
  background: linear-gradient(135deg, var(--blue) 0%, var(--navy) 100%);
  color: white;
  padding: 28px 28px 24px;
  text-align: center;
}
.card-header h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 22px; font-weight: 900; margin-bottom: 6px;
}
.card-header p {
  font-size: 13px; opacity: 0.8;
}
.card-body { padding: 28px; }

/* Form */
label {
  display: block; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--gray); margin-bottom: 6px;
}
.input-wrap { position: relative; margin-bottom: 20px; }
.input-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 16px; pointer-events: none;
}
input[type="text"] {
  width: 100%; padding: 12px 12px 12px 40px;
  border: 2px solid var(--border); border-radius: 10px;
  font-size: 15px; font-family: inherit;
  transition: border-color 0.2s;
}
input[type="text"]:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,86,223,0.1);
}

/* Dropdown */
.dropdown {
  position: absolute; top: 100%; left: 0; right: 0;
  background: white; border: 2px solid var(--blue);
  border-radius: 10px; margin-top: 4px;
  max-height: 260px; overflow-y: auto;
  z-index: 100; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}
.dd-item {
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--lgray);
  display: flex; justify-content: space-between; align-items: center;
}
.dd-item:last-child { border-bottom: none; }
.dd-item:hover, .dd-item.active { background: var(--blue-xlight); }
.dd-name { font-weight: 700; font-size: 13px; }
.dd-sub { font-size: 11px; color: var(--gray); margin-top: 2px; }
.dd-zip {
  font-size: 11px; font-weight: 700; color: var(--blue);
  background: var(--blue-xlight); padding: 2px 8px;
  border-radius: 6px; white-space: nowrap;
}
.dd-none {
  padding: 16px; text-align: center;
  color: var(--gray); font-size: 13px;
}

/* Day Picker */
.day-picker {
  display: none; margin-bottom: 20px;
  padding: 14px 16px; background: var(--orange-light);
  border: 2px solid var(--orange); border-radius: 12px;
}
.day-picker-label {
  font-size: 12px; font-weight: 800; color: var(--orange);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
}
.day-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.day-btn {
  padding: 8px 18px; border: 2px solid var(--orange); border-radius: 8px;
  background: #fff; font-family: 'Montserrat', sans-serif;
  font-size: 13px; font-weight: 900; color: var(--orange);
  cursor: pointer; transition: all 0.15s;
}
.day-btn:hover { background: var(--orange); color: #fff; }

/* Result */
.result { display: none; margin-top: 4px; }
.result.show { display: block; }

.result-next {
  background: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 100%);
  border: 2px solid #86efac; border-radius: 14px;
  padding: 24px; text-align: center;
}
.result-next .hood-line {
  font-size: 12px; font-weight: 700; color: var(--green);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
}
.result-next .date-big {
  font-family: 'Montserrat', sans-serif;
  font-size: 24px; font-weight: 900; color: #065f46;
  margin: 8px 0 4px;
}
.result-next .days-away {
  font-size: 14px; font-weight: 700; color: var(--green);
}
.result-next .recycle-badge {
  display: inline-block; margin-top: 12px; padding: 4px 14px;
  border-radius: 8px; font-size: 12px; font-weight: 800;
  font-family: 'Montserrat', sans-serif;
}
.recycle-w { background: var(--green-light); color: var(--green); }
.recycle-bw { background: #ede9fe; color: #6d28d9; }

/* Schedule list */
.sched-list { margin-top: 16px; }
.sched-list h3 {
  font-size: 13px; font-weight: 800; color: var(--gray);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 2px solid var(--lgray);
}
.sched-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
  font-size: 13px;
}
.sched-row:nth-child(even) { background: var(--lgray); }
.sched-date { font-weight: 700; }
.sched-day { color: var(--gray); font-size: 12px; }
.sched-away {
  font-size: 11px; font-weight: 700; padding: 2px 10px;
  border-radius: 6px;
}
.sched-away.soon { background: #dcfce7; color: #065f46; }
.sched-away.later { background: var(--blue-xlight); color: var(--blue); }

/* Error */
.error-box {
  display: none; padding: 14px 16px;
  background: var(--red-light); border: 2px solid var(--red);
  border-radius: 10px; color: var(--red);
  font-weight: 600; font-size: 13px; margin-top: 4px;
}
.error-box.show { display: block; }

/* Footer */
.footer {
  text-align: center; padding: 20px;
  font-size: 12px; color: var(--gray);
}
.footer a { color: var(--blue); text-decoration: none; font-weight: 600; }

/* Mobile */
@media (max-width: 480px) {
  .card { margin: 16px auto; }
  .card-header { padding: 20px 20px 18px; }
  .card-header h1 { font-size: 19px; }
  .card-body { padding: 20px; }
  .result-next .date-big { font-size: 20px; }
}
</style>

// SCHEDULING ENGINE (from OCC Management System)
// ══════════════════════════════════════════════════════════

function getToday() {
  const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function getMondayForWeek(wNum) {
  const d = new Date(ANCHOR_MONDAY);
  d.setDate(d.getDate() + (wNum - ANCHOR_W) * 7);
  return d;
}

function getNextServiceDate(wNum, dayName, isQ, firstDate) {
  const today = getToday();
  const cycleWeeks = isQ ? 12 : 4;
  let target;
  if (firstDate) {
    target = new Date(firstDate + 'T00:00:00');
  } else {
    const monday = getMondayForWeek(wNum);
    target = new Date(monday);
    target.setDate(target.getDate() + DAY_OFF[dayName]);
  }
  while (target < today) target.setDate(target.getDate() + cycleWeeks * 7);
  return target;
}

function fmtDate(d) {
  return `${WDAYS[d.getDay()]}, ${MONTHS_FULL[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function fmtDaysAway(d) {
  const diff = Math.round((d - getToday()) / 86400000);
  if (diff === 0) return 'Today!';
  if (diff === 1) return 'Tomorrow';
  return `In ${diff} days`;
}

function normalizeStreet(s) {
  return s.toLowerCase()
    .replace(/^\d+(?=\s+\S)/, '')
    .replace(/,.*$/, '')
    .replace(/\s+\d{5}(-\d{4})?$/, '')
    .replace(/\s+(oh|ohio|ky|kentucky|in|indiana)\b.*$/i, '')
    .replace(/\s+(liberty twp?|hamilton twp?|west chester|mason|loveland|milford|fairfield|maineville|morrow|goshen|amelia|newtown|mariemont|madeira|glendale|silverton|clifton|terrace park|north bend|south lebanon|cincinnati)\b.*$/i, '')
    .replace(/[.,#]/g, '')
    .replace(/\bdr\.?\b/g, 'drive').replace(/\bst\.?\b/g, 'street')
    .replace(/\bave?\.?\b/g, 'avenue').replace(/\bct\.?\b/g, 'court')
    .replace(/\bln\.?\b/g, 'lane').replace(/\bblvd\.?\b/g, 'boulevard')
    .replace(/\brd\.?\b/g, 'road').replace(/\btrl?\.?\b/g, 'trail')
    .replace(/\bpl\.?\b/g, 'place').replace(/\bcir\.?\b/g, 'circle')
    .replace(/\s+/g, ' ').trim();
}

function addrTokens(s) {
  return normalizeStreet(s).split(/\s+/).filter(w => w.length >= 2);
}

function streetScore(tokens, street) {
  const norm = normalizeStreet(street);
  const suffixes = new Set(['court','drive','street','avenue','lane','boulevard','road','trail','place','circle','way','run','ridge','bend','grove','hill','park','lake','creek','terrace']);
  const keyTokens = tokens.filter(t => !suffixes.has(t));
  if (keyTokens.length > 0 && !keyTokens.every(t => norm.includes(t))) return 0;
  let score = 0;
  for (const t of tokens) {
    if (norm.includes(t)) score += (t.length >= 5 ? 3 : t.length >= 3 ? 2 : 1);
  }
  if (norm.startsWith(tokens.join(' '))) score += 5;
  return score;
}

function findMatches(raw) {
  const tokens = addrTokens(raw);
  if (tokens.length === 0) return [];
  const best = {};
  for (const hood of NEIGHBORHOODS) {
    let topScore = 0;
    if (hood.streets && hood.streets.length) {
      for (const st of hood.streets) {
        const s = streetScore(tokens, st);
        if (s > topScore) topScore = s;
      }
    }
    const nameScore = streetScore(tokens, hood.name);
    if (nameScore > topScore) topScore = nameScore;
    if (topScore < 2) continue;
    const dayFp = [...new Set(hood.slots.map(s => s.d))].sort().join(',');
    const key = hood.zip + '|' + dayFp;
    if (!best[key] || best[key].score < topScore) {
      best[key] = { hood, score: topScore };
    }
  }
  return Object.values(best).sort((a,b) => b.score - a.score).slice(0,6).map(x => x.hood);
}

// ══════════════════════════════════════════════════════════
// UI LOGIC
// ══════════════════════════════════════════════════════════

let selectedHood = null;
let ddIdx = -1;

function onInput(val) {
  ddIdx = -1;
  const dd = document.getElementById('dropdown');
  const trimmed = val.trim();
  hideResult(); hideDayPicker(); hideError();

  if (trimmed.length < 3) { dd.style.display = 'none'; return; }

  // Direct ZIP entry
  if (/^\d{5}$/.test(trimmed)) {
    dd.style.display = 'none';
    lookupByZip(trimmed);
    return;
  }
  if (/^\d+$/.test(trimmed)) {
    dd.innerHTML = '<div class="dd-none">Add your street name &mdash; e.g. "' + trimmed + ' Stillwater Dr"</div>';
    dd.style.display = 'block';
    return;
  }

  const matches = findMatches(trimmed);
  if (!matches.length) {
    dd.innerHTML = '<div class="dd-none">No matching streets found &mdash; try entering your 5-digit ZIP code</div>';
    dd.style.display = 'block';
    return;
  }

  // Unique ZIPs & day sets
  const zips = [...new Set(matches.map(h => h.zip))];
  const daySets = [...new Set(matches.map(h => [...new Set(h.slots.map(s => s.d))].sort().join(',')))];

  if (matches.length === 1 || (zips.length === 1 && daySets.length === 1)) {
    dd.style.display = 'none';
    selectHood(matches[0]);
    return;
  }

  if (zips.length === 1 && daySets.length > 1) {
    dd.style.display = 'none';
    const uniqueDays = [...new Set(matches.flatMap(h => h.slots.map(s => s.d)))];
    selectedHood = matches[0];
    showDayPicker(uniqueDays, matches[0].name);
    return;
  }

  // Multiple ZIPs — show list
  dd.innerHTML = matches.map((h, i) => {
    const zi = ZIP_INFO[h.zip] || {};
    const city = zi.city || h.zip;
    const days = [...new Set(h.slots.map(s => s.d))].join(' / ');
    return `<div class="dd-item" data-idx="${i}" onmousedown="selectMatch(${i})">
      <div><div class="dd-name">${h.name}</div><div class="dd-sub">${city} &middot; ${days}</div></div>
      <div class="dd-zip">${h.zip}</div>
    </div>`;
  }).join('');
  dd._matches = matches;
  dd.style.display = 'block';
}

function selectMatch(idx) {
  const dd = document.getElementById('dropdown');
  const matches = dd._matches;
  if (matches && matches[idx]) {
    dd.style.display = 'none';
    selectHood(matches[idx]);
  }
}

function selectHood(h) {
  selectedHood = h;
  const uniqueDays = [...new Set(h.slots.map(s => s.d))];
  if (uniqueDays.length === 1) {
    showSchedule(h, uniqueDays[0]);
  } else {
    showDayPicker(uniqueDays, h.name);
  }
}

function lookupByZip(zip) {
  const slots = SCHEDULE[zip];
  if (!slots || !slots.length) {
    showError(`ZIP ${zip} is not in our service area. Call us at (513) 860-2080 for help!`);
    return;
  }
  const uniqueDays = [...new Set(slots.map(s => s.d))];
  const zi = ZIP_INFO[zip] || {};
  const label = zi.city ? (zi.hood ? zi.city + ' / ' + zi.hood : zi.city) : zip;
  if (uniqueDays.length === 1) {
    selectedHood = null;
    showScheduleForZip(zip, uniqueDays[0]);
  } else {
    selectedHood = null;
    showDayPicker(uniqueDays, label);
    // Store zip for later
    document.getElementById('dayPicker').dataset.zip = zip;
  }
}

function showDayPicker(days, label) {
  const picker = document.getElementById('dayPicker');
  const dayOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const sorted = days.slice().sort((a,b) => dayOrder.indexOf(a) - dayOrder.indexOf(b));
  document.getElementById('dayPickerLabel').textContent = label + ' has multiple pickup days \u2014 which is yours?';
  document.getElementById('dayBtns').innerHTML = sorted.map(d =>
    `<button class="day-btn" onclick="pickDay('${d}')">${d}</button>`
  ).join('');
  picker.style.display = 'block';
}

function pickDay(day) {
  hideDayPicker();
  if (selectedHood) {
    showSchedule(selectedHood, day);
  } else {
    const zip = document.getElementById('dayPicker').dataset.zip;
    if (zip) showScheduleForZip(zip, day);
  }
}

function showScheduleForZip(zip, day) {
  const slots = (SCHEDULE[zip] || []).filter(s => s.d === day);
  if (!slots.length) { showError(`No ${day} service found for ZIP ${zip}.`); return; }
  const zi = ZIP_INFO[zip] || {};
  const label = zi.city ? (zi.hood ? zi.hood + ', ' + zi.city : zi.city) : zip;
  renderResult(zip, label, null, slots, day);
}

function showSchedule(hood, day) {
  const slots = hood.slots.filter(s => s.d === day);
  if (!slots.length) {
    // Fallback to ZIP-level slots for that day
    const zipSlots = (SCHEDULE[hood.zip] || []).filter(s => s.d === day);
    if (!zipSlots.length) { showError(`No ${day} service found.`); return; }
    renderResult(hood.zip, hood.name, hood, zipSlots, day);
    return;
  }
  renderResult(hood.zip, hood.name, hood, slots, day);
}

function renderResult(zip, label, hood, slots, day) {
  hideError();
  const zi = ZIP_INFO[zip] || {};
  const freq = (hood && hood.recycleFreq) || RECYCLE_FREQ[zip] || '';

  // Build all upcoming dates for next 12 weeks
  const today = getToday();
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() + 84);
  const allDates = [];
  const seen = new Set();

  slots.forEach(slot => {
    const wNum = parseInt(slot.w.replace('W',''));
    const cycleWeeks = slot.isQ ? 12 : 4;
    let target = getNextServiceDate(wNum, slot.d, slot.isQ, slot.firstDate);
    const testBack = new Date(target); testBack.setDate(testBack.getDate() - cycleWeeks * 7);
    if (testBack >= today) target = testBack;
    while (target <= cutoff) {
      if (target >= today) {
        const key = target.toDateString();
        if (!seen.has(key)) {
          seen.add(key);
          allDates.push({ date: new Date(target), slot });
        }
      }
      target.setDate(target.getDate() + cycleWeeks * 7);
    }
  });

  allDates.sort((a,b) => a.date - b.date);

  if (!allDates.length) { showError('No upcoming service dates found.'); return; }

  const next = allDates[0];
  const diff = Math.round((next.date - today) / 86400000);

  // Recycle badge
  let recycleBadge = '';
  if (freq === 'W') {
    recycleBadge = '<span class="recycle-badge recycle-w">Recycling: Weekly pickup</span>';
  } else if (freq === 'BW') {
    recycleBadge = '<span class="recycle-badge recycle-bw">Recycling: Every other week</span>';
  }

  // Location line
  let locLine = label;
  if (zi.city && label !== zi.city && !label.includes(zi.city)) {
    locLine += ' &middot; ' + zi.city;
  }

  const resultNext = document.getElementById('resultNext');
  resultNext.innerHTML = `
    <div class="hood-line">${locLine} &middot; ${zip}</div>
    <div style="font-size:13px;color:#065f46;font-weight:600;margin-bottom:2px;">Next ${day} Pickup</div>
    <div class="date-big">${fmtDate(next.date)}</div>
    <div class="days-away">${diff === 0 ? '&#x2705; Today!' : diff === 1 ? '&#x1F4C5; Tomorrow' : '&#x1F4C5; ' + fmtDaysAway(next.date)}</div>
    ${recycleBadge}
  `;

  // Schedule list (remaining dates)
  const schedList = document.getElementById('schedList');
  if (allDates.length > 1) {
    const rows = allDates.slice(1).map(item => {
      const d = item.date;
      const away = Math.round((d - today) / 86400000);
      const awayClass = away <= 14 ? 'soon' : 'later';
      return `<div class="sched-row">
        <div>
          <div class="sched-date">${MONTHS_FULL[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}</div>
          <div class="sched-day">${WDAYS[d.getDay()]}</div>
        </div>
        <span class="sched-away ${awayClass}">${away} days</span>
      </div>`;
    }).join('');
    schedList.innerHTML = `<h3>Upcoming 12-Week Schedule</h3>${rows}`;
    schedList.style.display = 'block';
  } else {
    schedList.style.display = 'none';
  }

  document.getElementById('resultBox').classList.add('show');
}

function onKey(e) {
  const dd = document.getElementById('dropdown');
  if (dd.style.display === 'none') return;
  const items = dd.querySelectorAll('.dd-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    ddIdx = Math.min(ddIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === ddIdx));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    ddIdx = Math.max(ddIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === ddIdx));
    e.preventDefault();
  } else if (e.key === 'Enter') {
    if (ddIdx >= 0) selectMatch(ddIdx);
    else if (items.length === 1) selectMatch(0);
    e.preventDefault();
  } else if (e.key === 'Escape') {
    dd.style.display = 'none';
  }
}

document.addEventListener('click', e => {
  if (!document.querySelector('.input-wrap')?.contains(e.target)) {
    document.getElementById('dropdown').style.display = 'none';
  }
});

function showError(msg) {
  const eb = document.getElementById('errorBox');
  eb.textContent = msg;
  eb.classList.add('show');
}
function hideError() { document.getElementById('errorBox').classList.remove('show'); }
function hideResult() { document.getElementById('resultBox').classList.remove('show'); }
function hideDayPicker() { document.getElementById('dayPicker').style.display = 'none'; }
</script>
